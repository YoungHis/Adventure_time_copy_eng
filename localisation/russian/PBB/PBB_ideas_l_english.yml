 PBB_member_of_tax_deal_desc: "[PBB.GetName] has exclusive access to our treasury and resources. In exchange for these payments, [PBB.GetLeader] pledges to defend our territories as if they were her own. Direct entry into war on our side is not guaranteed, but we can count on substantial military support"
