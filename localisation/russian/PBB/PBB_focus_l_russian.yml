l_english:

 ##PBB
 PBB_focus_tree_two: "The Bubblegum Way (seasons 1-2)"
 EXAMPLE_BB: "Bubblegum paid attention to us"
 SHARED_licvidate_getto_tt: "\nAfter the level of subordination in each individual region rises to at least 85%, the region will become national again, and the level of banditry will decrease.."
 final_of_street_wars: "The end of the war on crime"
 PBB_last_experiment: "Our latest experiment"
 PBB_last_experiment_desc: "It is necessary to summarize the results of the latest experiment on the revival of candy people. It must be a worthwhile scientific breakthrough, otherwise months of work will be wasted.  Princess Bubblegum won't survive this."
 PBB_last_experiment_flag: "The experiment is completed"
 PBB_only_one_power: "Strengthen the authority of the princess"
 PBB_only_one_power_desc: "Candy people cannot decide their own fate on their own. He still understands too little about the structure of this world, and only the Globe knows what will happen if the royal power weakens. We must eliminate any options for delegating authority and strengthen the vertical of power of the Candy Kingdom."
 PBB_project_leader_forever: "Project «Eternal life»"
 PBB_project_leader_forever_desc: "No one knows for sure how long Bubblegum has been in power... And this secret must remain a secret. But nothing in this world lives forever, and sooner or later the princess of the candy kingdom will have to let her people go.. Everything must be done to delay this moment."
 PBB_watching_for_people_more_and_more: "Spread surveillance"
 PBB_watching_for_people_more_and_more_desc: "For effective management, it is necessary not only to overcome crises, but to anticipate their emergence and eradicate them in the bud.. By establishing total surveillance of the population, we will be able to control their behavior and desires many times more effectively, and nothing will take us by surprise."
 PBB_we_need_changes: "Changes"
 PBB_we_need_changes_desc: "The latest case with an error in the resurrection formula only once again confirmed how incompetently Bubblegum cares about the security of her country. She became so self-confident and short-sighted that she almost lost her kingdom overnight. It can't go on like this. Our hearts need changes, Princess!"
 PBB_start_new_researches: "Begin new experiments"
 PBB_start_new_researches_desc: "The kingdom of science is not built in the blink of an eye. This is a tough path full of bumps and crevices, which we will overcome by the strength of joint work and dedication to our work."
 PBB_elections_in_new_parlament: "Elections to the new Parliament"
 PBB_elections_in_new_parlament_desc: "The first step towards positive changes in society is the creation of additional government bodies that the princess can consult with when she decides to give the green light to a new policy. In this council, we must select the most worthy, the best of the best."
 PBB_changes_in_civil_life: "Quality of life improvement Program"
 PBB_changes_in_civil_life_desc: "Government «[ROOT.GetRulingPartyLong]» will do everything to make life in the new republic blissful and secure. And we'll start by redistributing the expenditures of Princess Bubblegum's secret elaborations."
 PBB_start_reforms: "It's a start"
 PBB_start_reforms_desc: "And only the gods know what lies ahead..."
 PBB_effect_from_focus_watching: "\nThe effect of this focus will change if the focus is performed previously §YSpread surveillance§!"
 PBB_effect_from_focus_civillife: "\nThe effect of this focus will change if the focus is performed previously §YQuality of life improvement Program§!"
 PBB_explain_control_tools_tt: "\nThe effect of this decision will change if the focus is performed previously §YPolice Department§!"
 PBB_contine_researches_tt: "Scientific breakthroughs in decisions will be more likely to succeed."
 
 SHARED_extra_cavarly_squads_tt: "\nIn non-national regions, submission will increase and resistance will decrease."
 SHARED_train_elite_tt: "\n§YRattleballs§! will return to service."
 SHARED_declare_undepended_tt: "\n§RThere is a high probability that they will try to stop us by force!§!"
 SHARED_light_slavery_tt: "\nA division of 2 infantry battalions and 2 artillery battalions will be added to each of our non-national regions under control."
 SHARED_expansion_industry_tt: "\nIf we have non-national regions, this focus will add industry there."
 SHARED_homeland_industry: "The benefits industry"
 SHARED_homeland_industry_desc: "The prosperity of the Candy Kingdom begins with production! More jobs, stable incomes, and access to quality products are our goals. Let every citizen feel the care of the state, and let innovations and technologies become the driving force of our well-being. Together we will build a bright future full of opportunities and abundance!"
 SHARED_expansion_industry: "The Industry of War"
 SHARED_expansion_industry_desc: "The Candy Kingdom is constantly under threat of invasion by dark forces, from rogue magicians to the Snow King. Princess Bubblegum needs to make her bet on the military industry. Let every factory become a fortress, and let every worker become a defender of our land. We are ready to fight for peace and freedom!"
 SHARED_air_candy_forces: "Establish the Air Force"
 SHARED_air_candy_forces_desc: ""
 SHARED_bananguard: "Banana Guard"
 SHARED_bananguard_desc: "Banana Guard – the basis of our army, but it needs reforms. Frankly, the Guard is unreliable and sometimes useless in its current form. Time to fix it."
 SHARED_naval_candy_forces: "Publicize the state of the Navy"
 SHARED_naval_candy_forces_desc: ""
 SHARED_dangerous_situation: "[FROM.GetName] in danger"
 SHARED_dangerous_situation_desc: "[ROOT.GetRulingIdeology] can no longer hide the bitter taste of the coming changes. Anxiety is in the air, clouds are gathering on the horizon. We must face the storm fully armed, with hope and faith in the future."
 SHARED_investing_in_capital_infrastructure: "Investments in infrastructure"
 SHARED_investing_in_capital_infrastructure_desc: "Roads made of lollipops, bridges made of biscuits, tunnels made of chocolate! Infrastructure is the foundation of any kingdom (even the sweetest!). It's time for the residents of the Candy Kingdom to travel safely between their homes."
 SHARED_sponsoring_of_culture: "Sponsoring cultural projects"
 SHARED_sponsoring_of_culture_desc: "Culture is our soul, our history! If we let it fade away, what will be left of the Candy Kingdom? Investing in art is an investment in our future!"
 SHARED_industry_of_fun: "Entertainment industry"
 SHARED_industry_of_fun_desc: "Getting away from daily problems is a necessity for the happiness of our sweet people! The more entertainment they have, the less they will worry about the hardships of our state, which means they will be happier."
 SHARED_schools: "Education reform"
 SHARED_schools_desc: "Knowledge is power! Education reform will open the doors to the world of knowledge and opportunities for everyone. We will create the best schools and universities where everyone can discover their talents and find their place in life. Let our subjects become smart, educated and happy, because they will build our bright future!"
 SHARED_capital_of_bisness: "Business capital"
 SHARED_capital_of_bisness_desc: "Slastburg is the capital of business and sweet things, a place where caramel bars flow like a river! We will expand it so that businessmen have more space for their brilliant ideas. May sweet success come with you!"
 SHARED_influence_on_others_productions: "Lure manufacturers"
 SHARED_influence_on_others_productions_desc: "While we need skilled workers, there are unemployed professionals abroad. This is a great opportunity to attract them to us. We will give them what they need, and they will work for the good of our country. Let them bring their experience and skills, and we will give them a new home and hope for prosperity!"
 SHARED_sponsoring_of_local_factoryes: "Domestic industry"
 SHARED_sponsoring_of_local_factoryes_desc: "Every lollipop produced here is a symbol of our independence and strength! By supporting domestic pastry chefs, we are building a bastion against those who want to deprive us of our sweet freedom."
 SHARED_heaven_on_earth: "Capital Paradise"
 SHARED_heaven_on_earth_desc: "Slastburg is not just a capital, it’s a dream come true! We will turn it into a real paradise in OOO, where every resident will be surrounded by comfort, beauty and joy. More parks, more entertainment, more sweets on every corner! Let Sweetburg become a showcase of prosperity and a symbol of the entire Candy Kingdom!"
 SHARED_more_factories: "More factories"
 SHARED_more_factories_desc: "The future of the Candy Kingdom lies in innovation and prosperity! Больше фабрик означает не только больше рабочих мест и сладостей, но и возможность внедрять передовые технологии, создавать уникальные продукты и повышать качество жизни каждого жителя. Пусть каждый новый завод станет символом нашего стремления к прогрессу, а каждая инновация – шагом к благополучию и процветанию!"
 SHARED_life_in_empire: "Life in the Empire"
 SHARED_life_in_empire_desc: "Империя сласти является одним из самых влиятельных стран на просторах УУУ. С мнением нашей власти считаются все лидеры государств континента, ни одно мероприятие не может обойтись без нашего ведома. Однако внутри нашей великой державы все не так прекрасно, как хотелось"
 SHARED_inspection: "Increase the level of inspections"
 SHARED_inspection_desc: "The security of the empire is provided by our police and banana guards. Они обязаны соответствовать более высоким требованиям, ведь если вдруг появится угроза, эти хранители порядка должны исполнить свой долг"
 SHARED_commendante_hour: "Imposing a curfew"
 SHARED_commendante_hour_desc: "Улицы империи, которые днём выглядят безопасно, ночью превращаются в темное пространство для совершения гнусных дел. Пришло время для принятия чрезвычайных мер. Безопасность граждан превыше всего"
 SHARED_night_clubs: "The problem of night clubs"
 SHARED_night_clubs_desc: "Многочисленные кафе и бары, расположенные в жилых районах, предоставляют возможность организации приятного ночного досуга. Вот только эти заведения все сильнее начинают походить на крайне сомнительные организации. Время обратить свое внимание на них."
 SHARED_duble_agents: "Double Agents"
 SHARED_duble_agents_desc: "Without ears and eyes inside the gangs, we can be trapped, which will have terrible consequences. Time to make sure that we are always one step ahead and can prevent the coming danger"
 SHARED_try_to_talk: "Attempt at dialogue"
 SHARED_try_to_talk_desc: "There are too many bandits. We just don't have the strength to suppress absolutely all of them. Perhaps it is worth making some kind of compromise with those who are ready for peace"
 SHARED_licvidate_getto: "Elimination of the ghetto"
 SHARED_licvidate_getto_desc: "В каждом городе государства, несмотря на все социальные меры, все равно найдется такое место, которое как чернильное пятно на бумаге, будет портить общую городскую картину. Ещё хуже, что в этих районах хорошо приживается такая грязь, как бандитизм. Пришло время покончить с этим"
 SHARED_start_street_wars: "Street wars"
 SHARED_start_street_wars_desc: "Бандитские орды почти полностью захватили наше государство в течение последних нескольких ночей. Если мы и дальше будем медлить, они смогут свергнуть нашу законную власть. Время показать нашу силу и мощь! Вряд-ли это пойдет не по плану"
 SHARED_black_market_question: "Issue of the black market"
 SHARED_black_market_question_desc: "Мало того, что наша торговля переживает не самый лучший период истории, нам в спину ударяет ещё и черный рынок. Этот рынок - настоящее собрание контрабандных изделий, запрещенных товаров и прочих отвратительных вещей. Благо, у нас есть идеи, как это решить"
 SHARED_road_to_puppets: "Все дороги ведут в [ROOT.Capital.GetName]"
 SHARED_road_to_puppets_desc: "В час нужды, когда тьма сгущается над Конфетным Королевством, Сластбург должен стать последним оплотом надежды и свободы. Укрепляя столицу, создавая неприступные оборонительные рубежи и обеспечивая бесперебойное снабжение, мы готовимся к худшему. Пусть каждый житель знает, что в Сластбурге он найдет защиту и поддержку, а каждый враг – неминуемую гибель!"
 SHARED_our_people_on_plances: "Свои люди на местах"
 SHARED_our_people_on_plances_desc: "Тени шепчутся об опасности, а наши агенты слушают их эхо. Ни одна угроза не должна остаться незамеченной. Наши глаза и уши должны быть всегда открытыми"
 SHARED_building_on_occupite_states: "Оккупация - застройка"
 SHARED_building_on_occupite_states_desc: "Один раз поставив свое знамя на земле, оно должно стоять там всегда. Земля не будет возвращена врагам. Заводы будут строиться, укрепления - возводиться, демонстрируя нашу непреклонную волю."
 SHARED_civilian_mobilization: "Civil mobilization"
 SHARED_civilian_mobilization_desc: "Мягкость нашего конфетного народа непозволительна в наше время. Время вспомнить ему о том, что каждый житель - солдат, готовый с честью отдать жизнь за Конфетное Королевство!"
 SHARED_strong_unity: "Fostering unity"
 SHARED_strong_unity_desc: "Разобщенность порождает хаос, который ввергает государство в пропасть. Время показать, что вместе мы - стена, которую не сломить! Единство - наша сила, наша надежда, наша победа!"
 SHARED_occupation_laws: "Законы военного времени"
 SHARED_occupation_laws_desc: "Права и свободы - роскошь, которую мы не можем себе позволить. В войне нет места милосердию."
 SHARED_candy_formula_tt: "Во время войны [ROOT.GetName] сможет автоматически национализировать оккупируемые регионы, подчинение в которых достигло 50% взамен на 1% стабильности и поддержки войны."
 SHARED_influence_on_others_productions_tt: "\nМы отнимем по одной фабрике в столице у каждой страны, которой будет отправлено данное событие.\n\nПолучатели могут потребовать компенсации территориями!"
 SHARED_light_slavery: "Использование побеждённых"
 SHARED_light_slavery_desc: "Как бы это не звучало ужасно, но пора прибегнуть к этому методу. Голод, боль и страдания должны отойти на второй план, когда империя требует победы"
 SHARED_candy_formula: "Испытание конфетной формулы"
 SHARED_candy_formula_desc: "На наших необъятных просторах империи проживают не только конфеты, но другие существа. И если лояльность первых безусловна, то с другими она ставится под сомнение. Благо, у нас имеется одно средство, которое решит этот вопрос"
 SHARED_police_departament: "Полицейский департамент"
 SHARED_police_departament_desc: "Безопасность Конфетного Королевства – это, прежде всего, доверие и порядок. Мы верим в силу закона, а не в грубую силу. Пусть каждый житель чувствует себя защищенным не армией, а заботой!"
 SHARED_cameramans: "Всевидящие камеры"
 SHARED_cameramans_desc: "Тайна под сахарной пудрой? Подозрительный хруст печенья? Ничто не ускользнет от нашего сладкого ока! Бдительность – наша лучшая защита, а знание – сила, которая удерживает мир."
 SHARED_more_policemans: "More police officers"
 SHARED_more_policemans_desc: "Их служба и опасна и трудна! Больше стражей порядка – меньше безобразий. Мы строим мир без страха, где каждый может спокойно жить в империи!"
 SHARED_war_departament: "Военный департамент"
 SHARED_war_departament_desc: "Мы выбираем силу! В мире, полном опасностей, только мощная армия может гарантировать безопасность границ и сладость наших конфет. Готовьтесь защищать то, что принадлежит нам по праву!"
 SHARED_not_very_high_control: "Ограниченная свобода действий"
 SHARED_not_very_high_control_desc: "Война требует не только точного исполнения приказов, но и умения адаптироваться к непредвиденным обстоятельствам. Настало время пересмотреть устоявшиеся догмы и позволить командирам принимать решения, исходя из самой ситуации"
 SHARED_old_guard_question: "Старая гвардия в деле?"
 SHARED_old_guard_question_desc: "В их глазах — отблески былых сражений за право на сладкое! Ветеран — это кладезь тактики и опыта, не стоит недооценивать их вклад, когда конфетный трон в опасности!"
 SHARED_old_guard_question_flag: "Старая гвардия возвращена в строй"
 SHARED_strong_cult: "Культ страха"
 SHARED_strong_cult_desc: "Дисциплина – краеугольный камень военной мощи. Взращивая культ страха перед последствиями ослушания, мы укрепляем железную волю армии. Каждый солдат должен осознавать: нарушение приказа неминуемо влечет за собой суровое возмездие. Лишь через абсолютное повиновение и беспрекословное исполнение приказов мы создадим непобедимую силу, способную сокрушить любого врага. Посеяв семена ужаса неповиновения, мы пожнем плоды безоговорочной победы."
 SHARED_national_bank_okhranka: "Guarding the National Bank"
 SHARED_national_bank_okhranka_desc: "Сокровища Конфетного Королевства должны быть под защитой! Именно в нем хранятся наши основные резерные запасы. Страшно представить что будет, если он будет ограблен."
 SHARED_extra_cavarly_squads: "Develop the mounted police"
 SHARED_extra_cavarly_squads_desc: "Конная полиция – символ власти и порядка. Расширим кавалерийские подразделения, чтобы обеспечить торжественное присутствие в столице и поддержание стабильности на массовых мероприятиях. Престиж и дисциплина – залог спокойствия."
 SHARED_extra_battle_squads: "Развернуть дополнительные батальоны"
 SHARED_extra_battle_squads_desc: "Больше сахара для конфетной армии! Увеличим численность наших войск, чтобы ни один враг не смог устоять перед нашей сладкой мощью!"
 SHARED_unification: "Unification in the army"
 SHARED_unification_desc: "Единоначалие прежде всего! Больше никаких импровизаций и вольнодумства. Каждый солдат – винтик в огромном конфетном механизме, и должен беспрекословно выполнять приказы!"
 SHARED_rewards_original_persons: "Поощрение инициативных"
 SHARED_rewards_original_persons_desc: "Прояви смекалку на поле боя? Рискни ради победы? Получи повышение! В Конфетной армии ценят не только послушание, но и оригинальность. Самые находчивые конфетные воины получат возможность продвинуться по службе!"
 SHARED_artillery_polks: "Create artillery shelves"
 SHARED_artillery_polks_desc: "Нам не нужны грязные методы ведения войны! Возродим проверенную временем стратегию войны через грохот канонады и дисциплинированность расчетов. Пусть сотни орудий возвестят о мощи нашего государства, а каждый залп - ответом на любые посягательства на наши земли."
 SHARED_train_elite: "Подготовка элит"
 SHARED_train_elite_desc: "Лучшие из лучших, самые храбрые, самые отважные… И да, самые верные! Кто поведёт нашу армию к победе? Кто станет легендой конфетных полей сражений?"
 SHARED_heavy_industry_researches: "Исследования в области тяжёлой промышленности"
 SHARED_heavy_industry_researches_desc: "Большие конфеты требуют… больших технологий! Подготовим нашу промышленность к производству такого оружия, которое заставит вздрогнуть всех наших врагов!"
 SHARED_candy_tanks: "[ROOT.GetRulingIdeology]-танки"
 SHARED_candy_tanks_desc: "Символ мощи и инноваций! Бронированные корпуса из карамелизированной стали, орудия, стреляющие кристаллизованным сахаром, — эти машины внушают ужас врагам и вселяют надежду в сердца союзников. Конфетное Королевство создает будущее войны!"
 SHARED_bubleguards_activate: "Задействовать жвачных стражей"
 SHARED_bubleguards_activate_desc: "Жвачная стража —  главная сила и наша стеклянная надежда! Пора раскрыть весь потенциал этих живых стражей. Пусть покажут всё, на что они способны!"
 SHARED_mobilization_of_all: "General mobilization"
 SHARED_mobilization_of_all_desc: "От мармеладки до леденца, каждый житель Конфетного Королевства внесёт свой вклад в защиту родины! В единстве — наша сила, и вместе мы сокрушим любого врага!"
 SHARED_diplomatic_contacts: "Diplomatic contacts"
 SHARED_diplomatic_contacts_desc: "В бушующем море политических интриг мы ищем не только сиюминутных союзников, но и тихие гавани, где наши корабли смогут укрыться в шторм. Выберем тех, кто готов предоставить убежище нашей идее, нашим лидерам, нашим надеждам, если родные берега окажутся захвачены врагом."
 SHARED_ready_for_isolation: "Preparing for the blockade"
 SHARED_ready_for_isolation_desc: "Никакие невзгоды не смогут сломить нашу волю! Мы сильны своей изобретательностью и патриотизмом. Дадим отпор любым трудностям!"
 SHARED_barricade_capital: "Баррикады вокруг города [ROOT.Capital.GetName]"
 SHARED_barricade_capital_desc: "Уют и крепость объединяются в одно великое сооружение! [ROOT.Capital.GetName] — неприступная крепость. Пусть каждый сладкий кирпичик станет символом нашей решимости!"
 SHARED_burn_tactic: "Scorched Earth Tactics"
 SHARED_burn_tactic_desc: "Если враг посмеет вступить на нашу землю, то пожалеет об этом. Пусть найдет лишь руины, покрытые горелыми сластями. Пусть это станет уроком для всех захватчиков, кто жаждет нашей гибели!"
 SHARED_east_air_departament: "Восточное отделение"
 SHARED_east_air_departament_desc: ""
 SHARED_south_air_departament: "Южное отделение"
 SHARED_south_air_departament_desc: ""
