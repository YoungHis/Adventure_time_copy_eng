 PBB_life_in_kingdom: "Life in the kingdom"
 PBB_life_in_kingdom_desc: "[ROOT.GetLeader] does try to make life in the Empire better, of course, but even the people's relatively low intelligence doesn't stop them from being a headache. They're skittish and panic easily. Just give them an excuse, and they'll turn on you in a heartbeat, forgetting all the nice things you've done. The worst part is, there are always schemers who take advantage of how gullible our people are, spoon-feeding them ideas like overthrowing the authorities or causing civil unrest to serve their own purposes."
 mission_of_crime: "The Underworld in action"
 mission_of_crime_desc: "Most crimes in the Empire are pretty harmless, like someone dropping their ice cream because of a passerby. However, there are specific organized groups of unidentified individuals engaged in industrial sabotage and black market trafficking to evade the tax system."
