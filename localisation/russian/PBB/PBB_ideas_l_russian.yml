 PBB_candy_infrastructure: "Candy infrastructure"
 PBB_candy_infrastructure_desc: "В конфетном королевстве съедобно всё. Это хоть и попахивает канибализмом для нас, однако помогает поддерживать жизнь в королевстве на самых разных уровнях."
 PBB_candy_guard: "Gumball Guardians"
 PBB_candy_guard_desc: "Практически со времён основания Конфетного королевства эти стражи стоят на защите спокойного сна своих граждан. С ними наша столица превращается в нерушимую крепость... Ну. Почти. Главное, чтобы народ продолжал верить в то, что стражи неуязвимы."
 PBB_candy_guard_tt: "\n Идея будет снята в случае капитуляции."
