 PBB_danger_from_iceking: "Moderate threat from Ice King"
 PBB_danger_from_iceking_desc: "The Ice King is a dangerous and crazy man. His craving for abducting princesses knows no bounds, and therefore you must always be prepared for the fact that he will show up in the kingdom."
 PBB_big_danger_from_iceking: "Significant threat from the Ice King"
 PBB_big_danger_from_iceking_desc: "The Ice King is a dangerous and crazy man. His craving for abducting princesses knows no bounds, and therefore you must always be prepared for the fact that he will show up in the kingdom."
 PBB_small_danger_from_iceking: "Low threat from Ice King"
 PBB_small_danger_from_iceking_desc: "The Ice King is a dangerous and crazy man. His craving for abducting princesses knows no bounds, and therefore you must always be prepared for the fact that he will show up in the kingdom."
 PBB_danger_from_fire: "A moderate threat from the Flame Kingdom"
 PBB_danger_from_fire_desc: "[FIK.GetName] - country with a barely controlled urge to destroy, that [FIK.GetLeader] shows all the signs of a maniac, hungry for fires and chaos. If we let this bonfire ignite, all the lands of OOO will be under threat."
 PBB_big_danger_from_fire: "Significant threat from the Flame Kingdom"
 PBB_big_danger_from_fire_desc: "[FIK.GetName] - country with a barely controlled urge to destroy, that [FIK.GetLeader] shows all the signs of a maniac, hungry for fires and chaos. If we let this bonfire ignite, all the lands of OOO will be under threat."
 PBB_small_danger_from_fire: "A low threat from the Flame Kingdom"
 PBB_small_danger_from_fire_desc: "[FIK.GetName] - country with a barely controlled urge to destroy, а [FIK.GetLeader] так и вовсе подаёт все признаки маньяка, голодного до пожаров и хаоса. Если дать этому костру разгорется, все земли ООО окажутся под угрозой."
 PBB_danger_from_mage: "A moderate threat from magicians"
 PBB_danger_from_mage_desc: "Магия, не более чем обман и уловка для того, чтобы запудрить мозги особо верующим. Но людей поддающихся обману много и их нельзя не учитывать, когда речь идёт о государственной безопасности."
 PBB_big_danger_from_mage: "A significant threat from magicians"
 PBB_big_danger_from_mage_desc: "Магия, не более чем обман и уловка для того, чтобы запудрить мозги особо верующим. Но людей поддающихся обману много и их нельзя не учитывать, когда речь идёт о государственной безопасности."
